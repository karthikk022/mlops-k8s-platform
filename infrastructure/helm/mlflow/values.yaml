environment: dev
replicas: 1

image:
  repository: ghcr.io/mlflow/mlflow
  tag: v2.14.0
  pullPolicy: IfNotPresent

storage:
  bucket: mlflow-artifacts
  region: ap-south-1

postgres:
  host: localhost
  port: 5432
  database: mlflow
  username: mlflow
  password: changeme

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2
    memory: 4Gi

ingress:
  enabled: false
  host: mlflow.dev.mlops.platform
