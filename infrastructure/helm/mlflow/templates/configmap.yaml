apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-config
  namespace: {{ .Release.Namespace }}
data:
  MLFLOW_S3_ENDPOINT_URL: "https://s3.{{ .Values.storage.region }}.amazonaws.com"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  MLFLOW_S3_IGNORE_TLS: "false"
  AWS_DEFAULT_REGION: "{{ .Values.storage.region }}"
