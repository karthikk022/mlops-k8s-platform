apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mlflow-tls
  namespace: mlops
spec:
  secretName: mlflow-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "mlflow.mlops.platform"
    - "mlflow.prod.mlops.platform"
  usages:
    - server auth
  keystores:
    jks:
      create: true
      passwordSecretRef:
        name: mlflow-tls-keystore-password
---
