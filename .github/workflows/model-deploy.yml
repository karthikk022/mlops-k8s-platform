name: Model Deploy

on:
  workflow_run:
    workflows: ["ML Training Pipeline"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      model_name:
        description: "Model name in MLflow registry"
        required: true
        default: "loan-default-model"
      model_version:
        description: "Model version (staging -> prod after validation)"
        required: true
        default: "latest"
      canary_percent:
        description: "Canary traffic percentage"
        required: false
        default: "10"

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: mlops-prod

jobs:
  deploy-staging:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name mlops-staging --region ${{ env.AWS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy to staging
        run: |
          cat serving/InferenceService.yaml | \
            sed "s|latest|${{ github.event.inputs.model_version || 'latest' }}|g" | \
            kubectl apply -f - -n mlops

      - name: Wait for staging rollout
        run: |
          kubectl wait --for=condition=Ready --timeout=300s \
            inferenceservice/${{ github.event.inputs.model_name || 'loan-default-predictor' }} -n mlops

      - name: Run staging validation
        run: |
          MODEL_ENDPOINT=$(kubectl get inferenceservice ${{ github.event.inputs.model_name || 'loan-default-predictor' }} -n mlops -o jsonpath='{.status.url}')
          curl -s -H "Content-Type: application/json" \
            -d '{"inputs": [[5.1, 3.5, 1.4, 0.2], [6.2, 3.4, 5.4, 2.3]]}' \
            $MODEL_ENDPOINT/v2/models/${{ github.event.inputs.model_name || 'loan-default-predictor' }}/infer

  promote-to-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy canary
        run: |
          cat serving/canary-rollout.yaml | \
            sed "s|version: v2|version: ${{ github.event.inputs.model_version || 'latest' }}|g" | \
            kubectl apply -f - -n mlops

      - name: Monitor canary
        run: |
          echo "Monitoring canary for 10 minutes..."
          sleep 600
          ERROR_RATE=$(kubectl -n mlops exec -it deployment/prometheus-stack-kube-prom-prometheus -- \
            sh -c 'curl -s http://localhost:9090/api/v1/query?query=rate(kserve_errors_total[5m])' | \
            python -c "import sys,json; d=json.load(sys.stdin); print(d['data']['result'][0]['value'][1] if d['data']['result'] else '0')")
          echo "Error rate: $ERROR_RATE"
          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "Error rate too high! Rolling back..."
            kubectl -n mlops rollout undo rollout/loan-default-predictor-rollout
            exit 1
          fi

      - name: Promote to 100%
        run: |
          kubectl -n mlops argo rollouts promote loan-default-predictor-rollout
          echo "Model ${{ github.event.inputs.model_name || 'loan-default-model' }} version ${{ github.event.inputs.model_version || 'latest' }} promoted to 100%"

      - name: Tag in MLflow
        run: |
          pip install mlflow
          mlflow set_tracking_uri http://mlflow.mlops:5000
          version=${{ github.event.inputs.model_version || 'latest' }}
          mlflow models tag --name ${{ github.event.inputs.model_name || 'loan-default-model' }} --version $version --key "production" --value "true"
          mlflow models tag --name ${{ github.event.inputs.model_name || 'loan-default-model' }} --version $version --key "deployed_by" --value "${{ github.actor }}"
