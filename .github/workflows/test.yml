name: PR Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: pip install pytest pyyaml scikit-learn pandas pyarrow mlflow

      - name: YAML & JSON validation
        run: python -m pytest tests/test_configs.py -v --tb=short

      - name: ML pipeline unit tests
        run: python -m pytest tests/test_ml_pipeline.py -v --tb=short

      - name: End-to-end training tests
        env:
          MLFLOW_ALLOW_FILE_STORE: "true"
        run: python -m pytest tests/test_training_e2e.py -v --tb=short

      - name: Infrastructure validation
        run: bash tests/test_infra.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check shell scripts with shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning

      - name: Validate Dockerfiles with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ml-pipeline/training/Dockerfile
