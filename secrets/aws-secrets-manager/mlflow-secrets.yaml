# AWS Secrets Manager entries for MLOps platform
# Create with: aws secretsmanager create-secret --name <name> --secret-string <value>

secrets:
  - name: mlflow/rds/master-password
    description: MLflow RDS master password
    rotation: 30 days
    rotation_lambda: mlflow-rds-rotation

  - name: mlflow/grafana/admin-password
    description: Grafana admin password
    rotation: 90 days

  - name: mlflow/slack/webhook
    description: Slack webhook for MLOps alerts

  - name: mlflow/ecr/pull-token
    description: ECR pull token for CI/CD
    rotation: 7 days
