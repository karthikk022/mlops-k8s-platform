global:
  enabled: true
  namespace: vault

injector:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

server:
  image:
    repository: hashicorp/vault
    tag: "1.17.0"

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true
        api_addr = "http://vault-active.vault-internal:8200"
        cluster_addr = "https://vault-active.vault-internal:8201"

        storage "raft" {
          path = "/vault/data"
          node_id = "vault-0"
          retry_join {
            leader_api_addr = "http://vault-0.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-1.vault-internal:8200"
          }
          retry_join {
            leader_api_addr = "http://vault-2.vault-internal:8200"
          }
        }

        listener "tcp" {
          address       = "0.0.0.0:8200"
          tls_disable   = true
          cluster_address = "0.0.0.0:8201"
        }

        seal "awskms" {
          region     = "ap-south-1"
          kms_key_id = "alias/vault-unseal-key"
        }

        telemetry {
          prometheus_retention_time = "24h"
          disable_hostname          = true
        }

  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/vault-kms-unseal

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi

  persistence:
    enabled: true
    size: 10Gi
    storageClass: gp3

  extraEnvironmentVars:
    VAULT_ADDR: "http://127.0.0.1:8200"
    VAULT_API_ADDR: "http://vault-active.vault-internal:8200"
    VAULT_CLUSTER_ADDR: "https://vault-active.vault-internal:8201"

csi:
  enabled: true
  provider: "secrets-store.csi.k8s.io"
  daemonSet:
    image:
      repository: hashicorp/vault-csi-provider
      tag: "1.4.0"
